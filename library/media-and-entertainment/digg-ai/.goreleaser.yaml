version: 2
project_name: digg-ai-pp-cli
changelog:
  disable: true
builds:
  - id: digg-ai-pp-cli
    main: ./cmd/digg-ai-pp-cli
    binary: digg-ai-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/media-and-entertainment/digg-ai/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: digg-ai-pp-mcp
    main: ./cmd/digg-ai-pp-mcp
    binary: digg-ai-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: digg-ai-pp-cli
    repository:
      owner: david
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "AI news from digg.com/ai with offline state, endorser pivots, and velocity tracking no website surface gives you."
    install: |
      bin.install "digg-ai-pp-cli"
      bin.install "digg-ai-pp-mcp"
